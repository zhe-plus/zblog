server:
  port: 8080

spring:
  profiles:
    active: sqlite
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: false
  thymeleaf:
    cache: true
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

zblog:
  database-type: sqlite
  upload-dir: data/uploads
  cache-dir: data/cache
  log-dir: data/logs
  installed-file: .zblog_installed

logging:
  level:
    root: INFO
    com.zblog: INFO
